data:
  image_path: "images/sample.png"
  image_size: 64
  in_channels: 1
  steps_per_epoch: 512

dl:
  batch_size: 8
  num_workers: 0
  pin_memory: true

generator:
  latent_shape: [32, 4, 4, 4]
  channels: [32, 1024, 512, 128, 32, 1]
  kernels: [4, 4, 4, 4, 4]
  strides: [2, 2, 2, 2, 2]
  paddings: [2, 2, 2, 2, 3]
  output: "tanh"

critic:
  channels: [1, 64, 128, 256, 512, 1]
  kernels: [4, 4, 4, 4, 4]
  strides: [2, 2, 2, 2, 2]
  paddings: [1, 1, 1, 1, 0]

optimizer:
  lr: 0.0001
  betas: [0.9, 0.99]

trainer:
  gp_lambda: 10.0
  gen_batch_size: 8
  gen_freq: 5
  steps: 360000
  save_freq: 1000

device: "cuda"
